_format_version: '2.1'
_transform: true

###
### Local dev: Kong in Docker, upstreams on the host (Next :3000, Go :8080, Agent :8002).
### Use with: docker compose -f docker-compose.kong-local.yaml up -d
### Requires host.docker.internal (see compose extra_hosts).
###
consumers:
  - username: DASHBOARD

services:
  - name: api-service
    _comment: 'API: /api/* -> http://host.docker.internal:8080/*'
    url: http://host.docker.internal:8080/
    routes:
      - name: api-routes
        strip_path: true
        paths:
          - /api
    plugins:
      - name: cors

  - name: agent-service
    _comment: 'AI: /ai/* -> http://host.docker.internal:8002/*'
    url: http://host.docker.internal:8002/
    routes:
      - name: agent-routes
        strip_path: true
        paths:
          - /ai/
    plugins:
      - name: cors

  - name: agent-websocket
    _comment: 'WebSocket: /ws/chat -> host agent'
    url: http://host.docker.internal:8002
    protocol: ws
    routes:
      - name: ai-ws-route
        strip_path: false
        paths:
          - /ws/chat
    plugins:
      - name: cors

  - name: agent-stream-websocket
    _comment: 'WebSocket: /ws/stream -> host agent'
    url: http://host.docker.internal:8002
    protocol: ws
    routes:
      - name: ai-stream-ws-route
        strip_path: false
        paths:
          - /ws/stream
    plugins:
      - name: cors

  - name: ai-terminal-websocket
    _comment: 'WebSocket: /ws/terminal -> host (optional)'
    url: http://host.docker.internal:8003
    protocol: ws
    routes:
      - name: ai-terminal-ws-route
        strip_path: false
        paths:
          - /ws/terminal
    plugins:
      - name: cors

  - name: webhook-service
    _comment: 'Webhook: /webhook/* -> Go API on host'
    url: http://host.docker.internal:8080/
    routes:
      - name: webhook-routes
        strip_path: false
        paths:
          - /webhook
    plugins:
      - name: cors

  - name: web-service
    _comment: 'Web: /* -> Next.js dev server on host'
    url: http://host.docker.internal:3000/
    routes:
      - name: web-routes
        strip_path: false
        paths:
          - /
    plugins:
      - name: cors
